name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable && pnpm install
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: goto-bus-stop/setup-zig@v2
        if: matrix.cross
      - run: cd packages/rs-csv && ./node_modules/.bin/napi build --release --platform --target ${{ matrix.target }} --manifest-path ../../crates/napi/Cargo.toml -o artifacts ${{ matrix.cross && '--cross-compile' || '' }}
      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: packages/rs-csv/artifacts/
          if-no-files-found: error

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    name: Test - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - run: corepack enable && pnpm install
      - uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.target }}
          path: artifacts/
      - run: cp artifacts/*.node crates/napi/index.node
      - run: cd packages/rs-csv && pnpm build
      - run: bun test packages/rs-csv/test/

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: corepack enable && pnpm install
      - run: cd packages/rs-csv && ./node_modules/.bin/napi create-npm-dirs
      - uses: actions/download-artifact@v8
        with:
          path: packages/rs-csv/artifacts/
          merge-multiple: true
      - run: cd packages/rs-csv && ./node_modules/.bin/napi artifacts -d artifacts
      - name: Set version and publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG=${{ contains(github.ref_name, '-') && 'next' || 'latest' }}
          cd packages/rs-csv
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"
          ./node_modules/.bin/napi pre-publish -t npm --skip-optional-publish
          for dir in npm/*/; do
            (cd "$dir" && npm publish --access public --provenance --tag "$TAG")
          done
          npm publish --access public --provenance --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
